---
layout: default
---
<main class="wrap">
<article class="post">
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    {% if page.lang == 'ru' %}
      {{ page.date | date: "%-d %b %Y" }}
    {% else %}
      {{ page.date | date: "%b %-d, %Y" }}
    {% endif %}
  </div>
  <div class="post-body">
    {{ content }}
  </div>
  {% if page.lang == 'ru' %}
    <a class="back" href="{{ '/ru/blog/' | relative_url }}">← Все посты</a>
  {% else %}
    <a class="back" href="{{ '/blog/' | relative_url }}">← All posts</a>
  {% endif %}
</article>
</main>
